syntax = "proto3";

package blog_user_svr;

option go_package = "github.com/boyapple/grpcprotocol/blog_article_svr";

import "validate/validate.proto";

// 文章状态
enum ArticleStatus {
  ARTICLE_STATUS_UNKNOWN = 0;
  ARTICLE_STATUS_DRAFT = 1;      // 草稿
  ARTICLE_STATUS_PENDING = 2;    // 待审核
  ARTICLE_STATUS_PUBLISHED = 3;  // 已发布
  ARTICLE_STATUS_REJECTED = 4;   // 已拒绝
  ARTICLE_STATUS_OFFLINE = 5;    // 已下架
}

// 文章服务错误码
enum ErrCode {
  ERR_CODE_OK = 0;
}

message ArticleInfo {
  string article_id = 1;
  uint64 author_id = 2[(validate.rules).uint64.gt = 0];
  string title = 3;
  string summary = 4;
  string cover = 5;
  string content = 6;
  ArticleStatus status = 7;

  uint64 category_id = 20;
  repeated string tags = 21;
}

message CategoryInfo{
  uint64 id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string icon = 5;
}

message TagInfo{
  uint64 id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string color = 5;
}

message Feeds {
  string article_id = 1;
  uint64 author_id = 2;
  string title = 3;
  string summary = 4;
  uint64 category_id = 5;
  string slug = 6;
  string cover = 7;
  bool allow_comment = 8;
  uint32 word_count = 9;
  bool is_featured = 10;
  int64 publish_time = 20;
  int64 create_time = 21;
}

message SaveArticleReq{
  ArticleInfo article_info = 1 [(validate.rules).message.required = true];
}

message SaveArticleRsp{
  string id = 1;
}

message GetArticleReq{
  string article_id = 1;
}

message GetArticleRsp{
  ArticleInfo article_info = 1;
}

message QueryCategoryReq{

}

message QueryCategoryRsp{
  repeated CategoryInfo category_infos = 1;
}

message QueryTagReq{
  string name = 1;
}

message QueryTagRsp{
  repeated TagInfo tag_infos = 1;
}

service ArticleService{
  rpc SaveArticle(SaveArticleReq) returns (SaveArticleRsp);
  rpc GetArticle(GetArticleReq) returns (GetArticleRsp);

  rpc QueryCategory(QueryCategoryReq) returns (QueryCategoryRsp);
  rpc QueryTag(QueryTagReq) returns (QueryTagRsp);
}
