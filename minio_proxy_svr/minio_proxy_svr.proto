syntax = "proto3";

package minio_proxy_svr;

option go_package = "github.com/boyapple/grpcprotocol/minio_proxy_svr";

import "validate/validate.proto";

enum ErrCode{
  ERR_CODE_SUCCESS = 0;
}

message UploadObjectReq {
  string bucket = 1;
  string filename = 2[(validate.rules).string.min_len = 1];
  Chunk chunk = 3[(validate.rules).message.required = true];
}

message Chunk {
  bytes data = 1[(validate.rules).bytes.min_len = 1];
  int64 index = 2;
  bool is_last = 3;
}

message UploadObjectRsp {
  string url = 1;
}

service MinioProxySvr {
  rpc UploadObject(stream UploadObjectReq) returns (UploadObjectRsp);
}
